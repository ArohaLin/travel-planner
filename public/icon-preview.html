<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
  .container { display: flex; gap: 48px; align-items: flex-start; padding: 40px; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { color: white; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
  .sublabel { color: #aaa; font-size: 14px; margin-top: -10px; }
  img { width: 200px; height: 200px; border-radius: 44px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="label">A</div>
    <img src="/icon-preview-A.png" alt="設計 A">
    <div class="label" style="font-size:16px">極光藍</div>
    <div class="sublabel">深邃夜空 · 藍色地球 · 星空</div>
  </div>
  <div class="card">
    <div class="label">B</div>
    <img src="/icon-preview-B.png" alt="設計 B">
    <div class="label" style="font-size:16px">珊瑚橘</div>
    <div class="sublabel">夕陽漸層 · 扁平幾何 · 活潑</div>
  </div>
  <div class="card">
    <div class="label">C</div>
    <img src="/icon-preview-C.png" alt="設計 C">
    <div class="label" style="font-size:16px">翠綠探索</div>
    <div class="sublabel">深墨綠底 · 金色羅盤 · 質感</div>
  </div>
</div>
</body>
</html>
